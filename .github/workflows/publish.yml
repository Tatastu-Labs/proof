name: Publish to npm

# Publish @tatastu/proof via npm Trusted Publishing (OIDC). NO stored NPM_TOKEN.
# The npm CLI detects the GitHub Actions OIDC environment and mints a
# short-lived, package-scoped credential, and attaches build provenance
# automatically. This requires a one-time "Trusted publisher" configuration on
# npmjs.com (Packages → @tatastu/proof → Settings → Trusted publishing) pointing
# at this repo + workflow file. Long-lived publish tokens (incl. GAT bypass-2FA)
# are deprecated by npm for direct publishing, so we don't use one.
#
# Requirements (per npm docs): npm CLI >= 11.5.1 and Node >= 22.14.0.
# Triggered by pushing a version tag (vX.Y.Z) that matches package.json.
on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for OIDC trusted publishing

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22.14.0"
          registry-url: "https://registry.npmjs.org"

      # OIDC trusted publishing needs npm >= 11.5.1; Node 22.14's bundled npm is
      # older, so upgrade the CLI in place before publishing.
      - name: Upgrade npm to an OIDC-capable version
        run: npm install -g npm@latest

      - name: Install
        run: npm ci

      - name: Build + test
        run: npm test

      - name: Verify tag matches package.json version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG=$(node -p "require('./package.json').version")
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # No NODE_AUTH_TOKEN: with id-token:write + a configured trusted publisher,
      # `npm publish` authenticates via OIDC and attaches provenance on its own.
      - name: Publish
        if: github.event_name == 'push'
        run: npm publish --access public
